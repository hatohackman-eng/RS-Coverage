<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Polyfill to allow overwriting fetch in restricted environments (iframes)
			(function() {
				var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
				if (descriptor && !descriptor.set && descriptor.configurable) {
					var currentFetch = window.fetch;
					Object.defineProperty(window, 'fetch', {
						get: function() { return currentFetch; },
						set: function(v) { currentFetch = v; },
						configurable: true
					});
				}
			})();
		</script>
		<title>RS Coverage Analyzer</title>
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
